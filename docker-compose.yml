services:
  blockchain:
    build:
      context: ./blockchain
    ports:
      - "8545:8545"
    networks:
      - sparknet-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    networks:
      - sparknet-network
    depends_on:
      blockchain:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - REACT_APP_PROVIDER_URL=http://localhost:8545
      - REACT_APP_API_BASE_URL=http://localhost:5000/api
    networks:
      - sparknet-network
    depends_on:
      - backend
      - blockchain

networks:
  sparknet-network:
    driver: bridge
